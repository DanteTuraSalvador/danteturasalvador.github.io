# Beautiful Jekyll
remote_theme: daattali/beautiful-jekyll

# Site info
title: Dante Salvador
title-separator: "|"
subtitle: "Software Engineer / DDD Enthusiast / Open-Source Developer"
description: "Tech blog covering DDD, Clean Architecture, CQRS, and modern software patterns"
url: "https://danteturasalvador.github.io"

# Avatar (shown in navbar and homepage)
avatar: "/assets/img/avatar.jpg"

# Navigation
navbar-links:
  DDD Series:
    - Value Objects: "/ddd/2025/01/01/value-objects-chapter-01.html"
    - Strongly Typed IDs: "/ddd/2025/01/05/strongly-typed-ids-chapter-01.html"
    - Smart Enums: "/ddd/2025/01/08/smart-enums-chapter-01.html"
    - Result Pattern: "/ddd/2025/01/12/result-pattern-chapter-01.html"
    - Clean Architecture: "/ddd/2025/01/16/clean-architecture-chapter-01.html"
    - CQRS: "/ddd/2025/01/21/cqrs-chapter-01.html"
  Tags: "tags"
  Resume: "resume"
  About: "aboutme"

# Author
author: Dante Salvador

# Social
social-network-links:
  github: DanteTuraSalvador

# Homepage header
title-on-page: true

# Build
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Custom CSS
site-css:
  - "/assets/css/series.css"

# Number of posts per page
paginate: 10

# Post defaults
defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: post
      author: Dante Salvador
      readtime: true
      comments: false
      social-share: true
      thumbnail-img: "https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=400&h=200&fit=crop"
      before-content:
        - series-info.html
      after-content:
        - series-nav.html
  - scope:
      path: ""
    values:
      layout: page
      footer-extra:
        - subscribe.html
        - random-cover.html

# Remove Beautiful Jekyll branding from footer
remove-ads: true

# Exclusions
exclude:
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - .claude
