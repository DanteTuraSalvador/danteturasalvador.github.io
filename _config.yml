# Beautiful Jekyll
remote_theme: daattali/beautiful-jekyll

# Site info
title: Dante Salvador
subtitle: Software Engineering Blog
description: "Tech blog covering DDD, Clean Architecture, CQRS, and modern software patterns"
url: "https://danteturasalvador.github.io"

# Navigation
navbar-links:
  DDD Series:
    - Value Objects: "/2025/01/01/value-objects-chapter-01.html"
    - Strongly Typed IDs: "/2025/01/05/strongly-typed-ids-chapter-01.html"
    - Smart Enums: "/2025/01/08/smart-enums-chapter-01.html"
    - Result Pattern: "/2025/01/12/result-pattern-chapter-01.html"
    - Clean Architecture: "/2025/01/16/clean-architecture-chapter-01.html"
    - CQRS: "/2025/01/21/cqrs-chapter-01.html"
  Tags: "tags"
  About: "aboutme"

# Author
author:
  name: Dante Salvador

# Social
social-network-links:
  github: DanteTuraSalvador

# Build
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Custom CSS
site-css:
  - "/assets/css/series.css"

# Post defaults
defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: post
      author: Dante Salvador
      readtime: true
      comments: false
      social-share: true
      before-content:
        - series-info.html
      after-content:
        - series-nav.html

# Exclusions
exclude:
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - .claude
