---
layout: default
---

<div class="home">
  <h1>{{ page.title }}</h1>

  {{ content }}

  {% if site.posts %}
  <h2>Latest Tutorials</h2>
  <ul class="post-list">
    {% for post in site.posts %}
    <li>
      <span class="post-date">{{ post.date | date: "%B %d, %Y" }}</span>
      <a href="{{ post.url | relative_url }}">
        {{ post.title }}
      </a>
    </li>
    {% endfor %}
  </ul>
  {% endif %}
</div>
